<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Matchmaking | Premium Registration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #0f172a; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 40px; }
        h1 { text-align: center; color: #ff4d6d; font-size: 28px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 30px; }
        label { display: block; margin-top: 16px; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #334155; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; background: #f8fafc; transition: border 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ff4d6d; background: white; }
        .photo-upload-box { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; background: #f8fafc; transition: background 0.2s; margin-top: 10px; }
        .photo-upload-box:hover { background: #f1f5f9; border-color: #ff4d6d; }
        button { width: 100%; padding: 14px; background: #ff4d6d; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-top: 25px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #ff3355; }
        #result { text-align: center; margin-top: 15px; font-weight: 500; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Premium Matchmaking</h1>
    <p class="subtitle">Enter your details to find your global matching profile partner</p>

    <label for="fullName">Legal Full Name</label>
    <input id="fullName" placeholder="e.g. John Doe">

    <label for="displayName">Display Name (Public Name)</label>
    <input id="displayName" placeholder="e.g. Johnny">

    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Min 18">

    <label for="gender">Gender Identity</label>
    <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <label for="country">Country</label>
    <input id="country" placeholder="e.g. Canada">

    <label for="city">City</label>
    <input id="city" placeholder="e.g. Toronto">

    <label for="whatsapp">WhatsApp Number (With Country Code)</label>
    <input id="whatsapp" placeholder="e.g. +1234567890">

    <label for="occupation">Occupation / Profession</label>
    <input id="occupation" placeholder="e.g. Software Engineer, Business Owner">

    <label for="education">Highest Education Level</label>
    <input id="education" placeholder="e.g. Degree, Diploma, High School">

    <label for="religion">Religion / Faith Beliefs</label>
    <input id="religion" placeholder="e.g. Christian, Muslim, None">

    <label for="height">Height (e.g. cm or feet)</label>
    <input id="height" placeholder="e.g. 5'8 or 175cm">

    <label for="maritalStatus">Current Marital Status</label>
    <select id="maritalStatus">
        <option value="Single">Single</option>
        <option value="Divorced">Divorced</option>
        <option value="Widowed">Widowed</option>
    </select>

    <label for="children">Do you have children?</label>
    <input id="children" placeholder="e.g. None, or 2 children">

    <label for="aboutMe">About Me (Introduce Yourself)</label>
    <textarea id="aboutMe" rows="3" placeholder="Tell us about your lifestyle and values..."></textarea>

    <label for="goal">What relationship goals are you looking for?</label>
    <textarea id="goal" rows="2" placeholder="Marriage, Long-term, Dating..."></textarea>

    <label for="preference">Describe your ideal partner</label>
    <textarea id="preference" rows="2" placeholder="Age preference, character traits, values..."></textarea>

    <label>Upload Profile Verification Photos</label>
    <div class="photo-upload-box" onclick="document.getElementById('imageInput').click()">
        <p style="color: #64748b; font-size: 14px;">📸 Click here to select multiple photos</p>
        <input type="file" id="imageInput" multiple accept="image/*" style="display: none;" onchange="updatePhotoCount()">
        <p id="file-count" style="font-size: 12px; color: #ff4d6d; font-weight: 600; margin-top: 5px;"></p>
    </div>

    <button onclick="registerUser()">Submit Application</button>
    <div id="result"></div>
</div>

<script>
    function updatePhotoCount() {
        const input = document.getElementById('imageInput');
        const countDisplay = document.getElementById('file-count');
        countDisplay.textContent = input.files.length > 0 ? `✅ ${input.files.length} photos selected` : "";
    }
</script>
<script src="app.js"></script>
</body>
</html>
