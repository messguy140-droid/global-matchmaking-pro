<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Matchmaking | Admin Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f1f5f9; display: flex; height: 100vh; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { color: #ff4d6d; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #475569; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #ff4d6d; border: none; color: white; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #ff3355; }
        #error-msg { color: #ef4444; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Access Panel</h2>
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="Enter admin username">

        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">

        <button type="submit">Secure Login</button>
    </form>
    <div id="error-msg"></div>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById("error-msg");
        errorDiv.textContent = "";

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const API_BASE_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000"
            : window.location.origin;

        try {
            const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.success) {
                // Save the session token to localStorage securely
                localStorage.setItem("adminToken", data.token);
                // Redirect straight into the dashboard view
                window.location.href = "dashboard.html";
            } else {
                errorDiv.textContent = data.message || "Invalid credentials.";
            }
        } catch (err) {
            errorDiv.textContent = "Server communication breakdown.";
        }
    });
</script>

</body>
</html>
